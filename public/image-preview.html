<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: transparent;
      user-select: none;
      -webkit-user-select: none;
      position: relative;
    }
    #wrap {
      position: absolute;
      left: 0;
      top: 0;
      display: inline-block;
      will-change: width, height, top;
    }
    body.align-right #wrap {
      left: auto;
      right: 0;
    }
    img, video {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      opacity: 0;
      transition: opacity 0.15s ease;
      border-radius: 4px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.25);
    }
    img.loaded, video.loaded { opacity: 1; }
    video { display: none; }
    video.active { display: block; }
    video.active + img { display: none; }
    #badge {
      position: absolute;
      bottom: 6px;
      right: 6px;
      background: rgba(0,0,0,0.6);
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 12px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 4px;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
      white-space: nowrap;
    }
    #badge.visible { opacity: 1; }
  </style>
</head>
<body>
  <div id="wrap">
    <video id="video-preview" muted playsinline></video>
    <img id="preview" />
    <div id="badge"></div>
  </div>
  <script>
    const wrap = document.getElementById('wrap');
    const video = document.getElementById('video-preview');
    const img = document.getElementById('preview');
    const badge = document.getElementById('badge');
    let videoTimer = null;
    let hideTimer = null;
    let animRaf = null;
    const currentRect = { width: 0, height: 0, top: 0 };
    const targetRect = { width: 0, height: 0, top: 0 };

    function applyRect(rect) {
      wrap.style.width = rect.width + 'px';
      wrap.style.height = rect.height + 'px';
      wrap.style.top = rect.top + 'px';
    }

    function stopRectAnimation() {
      if (animRaf != null) {
        cancelAnimationFrame(animRaf);
        animRaf = null;
      }
    }

    function startRectAnimation() {
      if (animRaf != null) return;
      const animate = () => {
        const k = 0.35;
        currentRect.width += (targetRect.width - currentRect.width) * k;
        currentRect.height += (targetRect.height - currentRect.height) * k;
        currentRect.top += (targetRect.top - currentRect.top) * k;

        applyRect(currentRect);

        const done =
          Math.abs(targetRect.width - currentRect.width) < 0.2 &&
          Math.abs(targetRect.height - currentRect.height) < 0.2 &&
          Math.abs(targetRect.top - currentRect.top) < 0.2;

        if (done) {
          currentRect.width = targetRect.width;
          currentRect.height = targetRect.height;
          currentRect.top = targetRect.top;
          applyRect(currentRect);
          animRaf = null;
          return;
        }
        animRaf = requestAnimationFrame(animate);
      };
      animRaf = requestAnimationFrame(animate);
    }

    function showBadge(text) {
      badge.textContent = text;
      badge.classList.add('visible');
      if (hideTimer) clearTimeout(hideTimer);
      hideTimer = setTimeout(() => badge.classList.remove('visible'), 1200);
    }

    function clearBadge() {
      badge.classList.remove('visible');
      if (hideTimer) { clearTimeout(hideTimer); hideTimer = null; }
    }

    if (window.__TAURI__) {
      const { listen } = window.__TAURI__.event;
      const { convertFileSrc } = window.__TAURI__.core;

      listen('video-preview-update', (event) => {
        const { videoPath, width, height, offsetY, align, duration } = event.payload;
        // 隐藏图片，显示视频
        img.classList.remove('loaded');
        img.removeAttribute('src');
        clearBadge();
        document.body.className = align === 'right' ? 'align-right' : '';
        stopRectAnimation();
        currentRect.width = width || 0;
        currentRect.height = height || 0;
        currentRect.top = offsetY || 0;
        targetRect.width = currentRect.width;
        targetRect.height = currentRect.height;
        targetRect.top = currentRect.top;
        applyRect(currentRect);
        video.classList.add('active');
        video.src = convertFileSrc(videoPath);
        video.currentTime = 0;
        video.play().catch(() => {});
        video.classList.add('loaded');
        // 播放指定时长后暂停
        if (videoTimer) clearTimeout(videoTimer);
        const dur = (duration || 5) * 1000;
        videoTimer = setTimeout(() => { video.pause(); }, dur);
      });

      listen('video-preview-clear', () => {
        if (videoTimer) { clearTimeout(videoTimer); videoTimer = null; }
        video.pause();
        video.removeAttribute('src');
        video.load();
        video.classList.remove('loaded', 'active');
        // 同时清理图片状态
        img.classList.remove('loaded');
        img.removeAttribute('src');
        clearBadge();
        stopRectAnimation();
        currentRect.width = 0;
        currentRect.height = 0;
        currentRect.top = 0;
        targetRect.width = 0;
        targetRect.height = 0;
        targetRect.top = 0;
        applyRect(currentRect);
      });

      listen('image-preview-update', (event) => {
        const { imagePath, width, height, offsetY, align } = event.payload;
        // 隐藏视频，显示图片
        if (videoTimer) { clearTimeout(videoTimer); videoTimer = null; }
        video.pause();
        video.removeAttribute('src');
        video.load();
        video.classList.remove('loaded', 'active');
        img.classList.remove('loaded');
        clearBadge();
        document.body.className = align === 'right' ? 'align-right' : '';
        stopRectAnimation();
        currentRect.width = width || 0;
        currentRect.height = height || 0;
        currentRect.top = offsetY || 0;
        targetRect.width = currentRect.width;
        targetRect.height = currentRect.height;
        targetRect.top = currentRect.top;
        applyRect(currentRect);
        img.src = convertFileSrc(imagePath);
      });

      listen('image-preview-zoom', (event) => {
        const { width, height, offsetY, percent, active, align } = event.payload;
        if (align) document.body.className = align === 'right' ? 'align-right' : '';
        targetRect.width = width || 0;
        targetRect.height = height || 0;
        targetRect.top = offsetY || 0;
        startRectAnimation();
        if (active) showBadge(percent + '%');
      });

      listen('image-preview-clear', () => {
        if (videoTimer) { clearTimeout(videoTimer); videoTimer = null; }
        video.pause();
        video.removeAttribute('src');
        video.load();
        video.classList.remove('loaded', 'active');
        img.classList.remove('loaded');
        img.removeAttribute('src');
        clearBadge();
        stopRectAnimation();
        currentRect.width = 0;
        currentRect.height = 0;
        currentRect.top = 0;
        targetRect.width = 0;
        targetRect.height = 0;
        targetRect.top = 0;
        applyRect(currentRect);
      });

      img.addEventListener('load', () => img.classList.add('loaded'));
      img.addEventListener('error', () => img.classList.remove('loaded'));
    }
  </script>
</body>
</html>
